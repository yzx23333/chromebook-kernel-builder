# =============================================================================
# KERNEL VERSIONS: kernel_versions.conf
# Single source of truth for which kernel series to build.
#
# DEFAULT_SERIES is used when hardware_map.conf specifies "default"
# (which all entries should use unless a board needs a specific series).
#
# To upgrade all boards to a new LTS series, change DEFAULT_SERIES here.
# To test a specific board on a different series, override in hardware_map.conf.
#
# Format of series table (informational only, not parsed):
#   SERIES | EOL DATE | STATUS | NOTES
# =============================================================================

DEFAULT_SERIES=7.0
DEFAULT_SERIES_ARM64=6.18

ARM64_EXTERNAL_REPO_URL_MEDIATEK=https://github.com/hexdump0815/linux-mainline-mediatek-mt81xx-kernel
ARM64_EXTERNAL_REPO_URL_ROCKCHIP=https://github.com/hexdump0815/linux-mainline-and-mali-rockchip-rk33xx-kernel
ARM64_KERNEL_CONFIG_OPTIONS_URL=https://github.com/hexdump0815/kernel-config-options

# --- Available LTS series ---
# 6.6   | Dec 2026 | active LTS   | Best Chromebook audio support; primary target
# 6.12  | Dec 2028 | active LTS   | Better AMD Mendocino/Phoenix; use for newer boards
# 6.1   | Dec 2026 | active LTS   | Debian Trixie default; avoid (older SOF support)
