# =============================================================================
# configs/platform/mediatek-mt81xx.cfg
#
# Platform config fragment for MediaTek MT81xx Chromebooks
# (MT8173, MT8183, MT8186, MT8192, MT8195)
#
# Applied after hexdump0815's full config stack to guarantee critical
# options are present regardless of what the upstream base provides.
# =============================================================================

# ── SoC core ─────────────────────────────────────────────────────────────────
CONFIG_COMMON_CLK_MT8183=y
CONFIG_PINCTRL_MT8183=y
CONFIG_I2C_MT65XX=y
CONFIG_SPI_MT65XX=y
CONFIG_MMC_MTK=y
CONFIG_MTK_PMIC_WRAP=y
CONFIG_MTK_IOMMU=y
CONFIG_MTK_CMDQ=y

# ── ChromeOS EC ───────────────────────────────────────────────────────────────
CONFIG_CROS_EC=y
CONFIG_CROS_EC_SPI=y

# ── Display / GPU ─────────────────────────────────────────────────────────────
CONFIG_DRM_PANFROST=m
CONFIG_DRM_MEDIATEK=m

# ── Audio ─────────────────────────────────────────────────────────────────────
CONFIG_SND_SOC_MT8183=m

# ── WiFi ──────────────────────────────────────────────────────────────────────
CONFIG_ATH10K=m
CONFIG_ATH10K_SDIO=m

# ── Filesystem ────────────────────────────────────────────────────────────────
# btrfs must be built-in - velvet-os root filesystem, no initramfs
CONFIG_BTRFS_FS=y
