name: Build ARM64 Chromebook Kernels

on:
  # Run weekly on Sunday at 04:00 UTC (offset from x86_64 job at 02:00)
  #schedule:
  #  - cron: '0 4 * * 0'

  # Run on push to main when commit message contains [build:arm64] or [build:all]
  push:
    branches: [ main, next ]

  # Allow manual trigger with optional overrides
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel series override (e.g. 6.19), leave blank to use DEFAULT_SERIES_ARM64'
        required: false
        default: ''
      platform_filter:
        description: 'Build only this platform (e.g. mediatek-mt81xx), leave blank for all'
        required: false
        default: ''
      codename_filter:
        description: 'Build only this codename (e.g. esche), leave blank for all arm64'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ============================================================
  # Resolve the kernel version once, share across matrix jobs
  # ============================================================
  resolve-version:
    name: Resolve kernel version
    runs-on: ubuntu-26.04
    outputs:
      kernel_series: ${{ steps.resolve.outputs.kernel_series }}
      kernel_full:   ${{ steps.resolve.outputs.kernel_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve kernel version
        id: resolve
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          # Priority order:
          #   1. [kernel:x.y.z] or [kernel:x.y] tag in commit message
          #   2. workflow_dispatch kernel_version input
          #   3. DEFAULT_SERIES_ARM64 from kernel_versions.conf
          KERNEL_TAG=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            KERNEL_TAG=$(echo "$COMMITS_JSON" | \
              grep -oP '(?<=\[kernel:)[0-9]+\.[0-9]+(\.[0-9]+)?(?=\])' | head -1 || true)
            [[ -n "$KERNEL_TAG" ]] && echo "Kernel override from commit tag: $KERNEL_TAG" || true
          fi

          if [[ -n "$KERNEL_TAG" ]]; then
            SERIES="$KERNEL_TAG"
          elif [[ -n "${{ github.event.inputs.kernel_version }}" ]]; then
            SERIES="${{ github.event.inputs.kernel_version }}"
          else
            SERIES=$(grep "^DEFAULT_SERIES_ARM64=" configs/kernel_versions.conf \
                     | cut -d= -f2)
          fi

          if [[ -z "$SERIES" ]]; then
            echo "ERROR: DEFAULT_SERIES_ARM64 not set in configs/kernel_versions.conf"
            exit 1
          fi

          echo "Kernel series: $SERIES"
          echo "kernel_series=$SERIES" >> "$GITHUB_OUTPUT"

          FULL=$(curl -s --max-time 15 "https://www.kernel.org/releases.json" | \
            grep -o '"version": *"[0-9]*\.[0-9]*\.[0-9]*"' | \
            grep -o '"[0-9]*\.[0-9]*\.[0-9]*"' | \
            tr -d '"' | \
            grep "^${SERIES}\." | \
            sort -t. -k1,1n -k2,2n -k3,3n | \
            tail -1)

          # If SERIES was a full version (e.g. 6.12.80), use it directly
          if [[ -z "$FULL" && "$SERIES" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            FULL="$SERIES"
            echo "Using exact version from tag: $FULL"
          fi

          if [[ -z "$FULL" ]]; then
            echo "ERROR: Could not resolve latest ${SERIES}.x from kernel.org"
            exit 1
          fi
          echo "Resolved: linux-$FULL"
          echo "kernel_full=$FULL" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Generate build matrix from hardware_map.conf (arch=arm64)
  #
  # hardware_map.conf format:
  #   CODENAME|PLATFORM|KERNEL_SERIES|PATCH_DIR|ARCH|NOTES
  #
  # Field 5 (ARCH) must be "arm64" to be included here.
  # Existing x86_64 entries (5 fields or ARCH=x86_64) are ignored.
  # ============================================================
  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-26.04
    needs: resolve-version
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      skip:   ${{ steps.gen.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check push trigger
        id: push_check
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_TAG=$(echo "$COMMITS_JSON" | \
              grep -oP '(?<=\[build:)[^\]]+' | head -1 || true)
            KERNEL_TAG=$(echo "$COMMITS_JSON" | \
              grep -oP '(?<=\[kernel:)[0-9]+\.[0-9]+(\.[0-9]+)?(?=\])' | head -1 || true)
            echo "build_tag=${BUILD_TAG}"   >> "$GITHUB_OUTPUT"
            echo "kernel_tag=${KERNEL_TAG}" >> "$GITHUB_OUTPUT"
            [[ -n "$KERNEL_TAG" ]] && echo "Kernel tag found: $KERNEL_TAG" || true
          else
            echo "build_tag=all"  >> "$GITHUB_OUTPUT"
            echo "kernel_tag="    >> "$GITHUB_OUTPUT"
          fi

      - name: Generate matrix from hardware_map.conf
        id: gen
        env:
          BUILD_TAG:       ${{ steps.push_check.outputs.build_tag }}
          PLATFORM_FILTER: ${{ github.event.inputs.platform_filter }}
          CODENAME_FILTER: ${{ github.event.inputs.codename_filter }}
          KERNEL_SERIES:   ${{ needs.resolve-version.outputs.kernel_series }}
        run: |
          # On push, require [build:arm64], [build:all], or [build:<platform>/<codename>] tag
          if [[ "${{ github.event_name }}" == "push" && -z "$BUILD_TAG" ]]; then
            echo "No [build:*] tag in commit message - skipping arm64 build"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"family\":\"skip\",\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\",\"dtb_prefixes\":\"skip\",\"codenames\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse hardware_map.conf for arm64 entries
          # Format: CODENAME|PLATFORM|KERNEL_SERIES|PATCH_DIR|ARCH|DTB_PREFIX|NOTES
          ENTRIES=()
          while IFS='|' read -r codename platform series patch_dir arch dtb_prefix notes; do
            # Skip comments and blank lines
            [[ -z "$codename" || "$codename" == \#* ]] && continue
            # Trim whitespace
            codename="${codename// /}"; codename="${codename%%#*}"
            platform="${platform// /}"
            series="${series// /}"
            patch_dir="${patch_dir// /}"
            arch="${arch// /}"
            dtb_prefix="${dtb_prefix// /}"
            # Only arm64
            [[ "$arch" != "arm64" ]] && continue
            # Resolve "default" series
            [[ "$series" == "default" ]] && series="$KERNEL_SERIES"
            ENTRIES+=("${codename}|${platform}|${series}|${patch_dir}|${dtb_prefix}")
          done < configs/hardware_map.conf

          if [[ ${#ENTRIES[@]} -eq 0 ]]; then
            echo "No arm64 entries found in hardware_map.conf - skipping"
            echo "  To add a device, add a line with arm64 in field 5, e.g.:"
            echo "  esche|mediatek-mt81xx|default|none|arm64|HP Chromebook 11MK G9 EE"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"family\":\"skip\",\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\",\"dtb_prefixes\":\"skip\",\"codenames\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build JSON matrix, grouped by platform (device family).
          # Pass 1: apply filters per row; a family is selected if ANY of
          #         its member rows matches (so codename filters build the
          #         whole family kernel that device boots).
          # Pass 2: union dtb prefixes and codenames per selected family;
          #         kernel_series and patch_dir must agree across members.
          declare -A SELECTED FAM_PREFIXES FAM_CODENAMES FAM_SERIES FAM_PATCHDIR
          for entry in "${ENTRIES[@]}"; do
            IFS='|' read -r codename platform series patch_dir dtb_prefix <<< "$entry"

            # push filter
            if [[ "${{ github.event_name }}" == "push" ]]; then
              if [[ "$BUILD_TAG" != "all" && "$BUILD_TAG" != "arm64" \
                    && "$BUILD_TAG" != "$platform" && "$BUILD_TAG" != "$codename" ]]; then
                continue
              fi
            fi

            # workflow_dispatch filters
            if [[ -n "$PLATFORM_FILTER" && "$PLATFORM_FILTER" != "all" \
                  && "$PLATFORM_FILTER" != "$platform" ]]; then
              continue
            fi
            if [[ -n "$CODENAME_FILTER" && "$CODENAME_FILTER" != "all" \
                  && "$CODENAME_FILTER" != "$codename" ]]; then
              continue
            fi

            SELECTED[$platform]=1
          done

          for entry in "${ENTRIES[@]}"; do
            IFS='|' read -r codename platform series patch_dir dtb_prefix <<< "$entry"
            [[ -z "${SELECTED[$platform]:-}" ]] && continue

            if [[ -n "${FAM_SERIES[$platform]:-}" ]]; then
              if [[ "${FAM_SERIES[$platform]}" != "$series" ]]; then
                echo "ERROR: kernel_series conflict in platform ${platform}:"
                echo "  ${codename} wants ${series}, family has ${FAM_SERIES[$platform]}"
                echo "  Align the rows or give ${codename} its own platform value."
                exit 1
              fi
              if [[ "${FAM_PATCHDIR[$platform]}" != "$patch_dir" ]]; then
                echo "ERROR: patch_dir conflict in platform ${platform}:"
                echo "  ${codename} wants ${patch_dir}, family has ${FAM_PATCHDIR[$platform]}"
                echo "  Align the rows or give ${codename} its own platform value."
                exit 1
              fi
            else
              FAM_SERIES[$platform]="$series"
              FAM_PATCHDIR[$platform]="$patch_dir"
            fi

            # union of dtb prefixes (space-separated, deduped)
            case " ${FAM_PREFIXES[$platform]:-} " in
              *" ${dtb_prefix} "*) ;;
              *) FAM_PREFIXES[$platform]="${FAM_PREFIXES[$platform]:+${FAM_PREFIXES[$platform]} }${dtb_prefix}" ;;
            esac
            FAM_CODENAMES[$platform]="${FAM_CODENAMES[$platform]:+${FAM_CODENAMES[$platform]},}${codename}"
          done

          JSON='{"include":['
          FIRST=true
          for platform in "${!SELECTED[@]}"; do
            # family short name: mediatek-mt81xx -> mt81xx, rockchip-rk33xx -> rk33xx
            family=$(echo "$platform" | cut -d- -f2)
            echo "Family ${family}: codenames=${FAM_CODENAMES[$platform]} dtbs=${FAM_PREFIXES[$platform]}"
            [[ "$FIRST" == "true" ]] && FIRST=false || JSON+=','
            JSON+="{\"family\":\"${family}\",\"platform\":\"${platform}\","
            JSON+="\"kernel_series\":\"${FAM_SERIES[$platform]}\",\"patch_dir\":\"${FAM_PATCHDIR[$platform]}\","
            JSON+="\"dtb_prefixes\":\"${FAM_PREFIXES[$platform]}\",\"codenames\":\"${FAM_CODENAMES[$platform]}\"}"
          done
          JSON+=']}'

          # If all entries were filtered out, use dummy to avoid empty matrix error
          if [[ "$FIRST" == "true" ]]; then
            echo "No devices matched filters - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"family\":\"skip\",\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\",\"dtb_prefixes\":\"skip\",\"codenames\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Matrix: $JSON"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "skip=false"   >> "$GITHUB_OUTPUT"

  # ============================================================
  # Build - one job per device family (platform)
  # ============================================================
  build:
    name: Build ${{ matrix.family }} (${{ matrix.platform }})
    needs: [ resolve-version, generate-matrix ]
    if: needs.generate-matrix.outputs.skip != 'true'
    runs-on: ubuntu-26.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache kernel tarball
        uses: actions/cache@v4
        with:
          path: /var/tmp/kernel-tarballs
          key: kernel-tarball-arm64-${{ needs.resolve-version.outputs.kernel_full }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_full }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_series }}.
            ccache-${{ matrix.platform }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            libdw-dev dwarves pahole \
            kmod wget curl git xz-utils \
            ccache lz4 liblz4-dev u-boot-tools vboot-kernel-utils

      - name: Download kernel source
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          mkdir -p /var/tmp/kernel-tarballs
          TARBALL="/var/tmp/kernel-tarballs/linux-${KERNEL_FULL}.tar.xz"
          if [[ ! -f "$TARBALL" ]]; then
            MAJOR="${KERNEL_FULL%%.*}"
            echo "Downloading linux-${KERNEL_FULL}.tar.xz..."
            wget -q -O "$TARBALL" \
              "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KERNEL_FULL}.tar.xz"
          else
            echo "Using cached tarball"
          fi
          mkdir -p /var/tmp/kernel-build
          tar -xf "$TARBALL" -C /var/tmp/kernel-build

      # --------------------------------------------------------
      # Clone external patch/config source
      # URL is looked up from kernel_versions.conf using the
      # platform name: ARM64_EXTERNAL_REPO_URL_<PLATFORM_KEY>
      # e.g. mediatek-mt81xx -> ARM64_EXTERNAL_REPO_URL_MEDIATEK
      #      rockchip-rk3399 -> ARM64_EXTERNAL_REPO_URL_ROCKCHIP
      # --------------------------------------------------------
      - name: Clone external patch/config source
        env:
          KERNEL_SERIES: ${{ needs.resolve-version.outputs.kernel_series }}
          PLATFORM:      ${{ matrix.platform }}
        run: |
          # Derive key from platform name: mediatek-mt81xx -> MEDIATEK
          PLATFORM_KEY=$(echo "$PLATFORM" | cut -d- -f1 | tr '[:lower:]' '[:upper:]')
          EXT_URL=$(grep "^ARM64_EXTERNAL_REPO_URL_${PLATFORM_KEY}=" configs/kernel_versions.conf \
                    | cut -d= -f2-)

          if [[ -z "$EXT_URL" ]]; then
            echo "ARM64_EXTERNAL_REPO_URL_${PLATFORM_KEY} not set - skipping external clone"
            echo "ARM64_EXT_DIR=" >> "$GITHUB_ENV"
            exit 0
          fi

          EXT_DIR="/var/tmp/arm64-external-src"
          echo "Cloning $EXT_URL for platform $PLATFORM ..."
          git clone --depth=1 "$EXT_URL" "$EXT_DIR"
          echo "ARM64_EXT_DIR=${EXT_DIR}" >> "$GITHUB_ENV"

      # --------------------------------------------------------
      # Clone hexdump0815/kernel-config-options
      # Provides generic ARM64 Chromebook config fragments used
      # by hexdump's pipeline: chromebooks-aarch64.cfg, mediatek.cfg,
      # docker-options.cfg, additional-options-generic.cfg, etc.
      # --------------------------------------------------------
      - name: Clone kernel-config-options
        env:
          KERNEL_SERIES: ${{ needs.resolve-version.outputs.kernel_series }}
        run: |
          KCO_URL=$(grep "^ARM64_KERNEL_CONFIG_OPTIONS_URL=" configs/kernel_versions.conf \
                    | cut -d= -f2-)
          if [[ -z "$KCO_URL" ]]; then
            echo "ARM64_KERNEL_CONFIG_OPTIONS_URL not set - skipping"
            echo "ARM64_KCO_DIR=" >> "$GITHUB_ENV"
            exit 0
          fi
          KCO_DIR="/var/tmp/arm64-kco-src"
          echo "Cloning $KCO_URL ..."
          git clone --depth=1 "$KCO_URL" "$KCO_DIR"
          echo "ARM64_KCO_DIR=${KCO_DIR}" >> "$GITHUB_ENV"

          # Check for patch subdir - naming varies by repo (misc.cbm, misc.rkc etc.)
          # NOTE: uses ARM64_EXT_DIR exported by the previous step via GITHUB_ENV
          # (a bare EXT_DIR here is unset - that bug silently skipped all
          # external patches). Falls back to the nearest lower version dir if
          # the exact series has no patches upstream yet (e.g. v6.19 -> v6.18).
          FOUND=""
          if [[ -n "${ARM64_EXT_DIR:-}" ]]; then
            for subdir in misc.cbm misc.rkc misc.rk3 misc; do
              BASE="${ARM64_EXT_DIR}/${subdir}/patches"
              [[ -d "$BASE" ]] || continue
              PATCH_SUBDIR="${BASE}/v${KERNEL_SERIES}"
              if [[ ! -d "$PATCH_SUBDIR" ]]; then
                NEAREST=$( { ls -1 "$BASE"; echo "v${KERNEL_SERIES}"; } \
                           | grep '^v[0-9]' | sort -V \
                           | grep -B99 "^v${KERNEL_SERIES}\$" \
                           | grep -v "^v${KERNEL_SERIES}\$" | tail -1 )
                if [[ -n "$NEAREST" ]]; then
                  echo "NOTE: no patches/v${KERNEL_SERIES} upstream - falling back to ${NEAREST}"
                  PATCH_SUBDIR="${BASE}/${NEAREST}"
                fi
              fi
              if [[ -d "$PATCH_SUBDIR" ]]; then
                COUNT=$(find "$PATCH_SUBDIR" -name '*.patch' | wc -l)
                echo "External patch dir: $PATCH_SUBDIR ($COUNT patches)"
                echo "ARM64_EXT_PATCH_SUBDIR=${PATCH_SUBDIR}" >> "$GITHUB_ENV"
                FOUND="yes"
                break
              fi
            done
          fi
          if [[ -z "$FOUND" ]]; then
            echo "WARNING: no patch subdir found for v${KERNEL_SERIES} in ${ARM64_EXT_DIR:-<unset>}"
            [[ -n "${ARM64_EXT_DIR:-}" ]] && \
              find "$ARM64_EXT_DIR" -maxdepth 3 -type d -name "patches" | sort || true
          fi

      # --------------------------------------------------------
      # Apply patches
      # 1. External upstream (hexdump0815 et al.)
      # 2. Local patches/<patch_dir>/*.patch (contributor overrides)
      #    patch_dir comes from hardware_map.conf field 4.
      #    Use "none" if no local patches needed.
      # See patches/<platform>/README.md for guidance.
      # --------------------------------------------------------
      - name: Apply patches
        env:
          KERNEL_FULL:   ${{ needs.resolve-version.outputs.kernel_full }}
          KERNEL_SERIES: ${{ needs.resolve-version.outputs.kernel_series }}
          PATCH_DIR:     ${{ matrix.patch_dir }}
        run: |
          sudo chown -R "$USER:$USER" "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          cd "/var/tmp/kernel-build/linux-${KERNEL_FULL}"

          apply_patch() {
            echo "  $(basename "$1")"
            patch -p1 --forward < "$1" \
              || echo "  WARNING: $(basename "$1") did not apply cleanly"
          }

          # 1. External patches - derive SoC prefix from dtb_prefix
          # e.g. mt8183-kukui -> mt8183, mt8173-elm -> mt8173, rk3399-gru -> rk3399
          if [[ -n "$ARM64_EXT_DIR" && -n "${ARM64_EXT_PATCH_SUBDIR:-}" ]]; then
            EXT_PATCH_DIR="$ARM64_EXT_PATCH_SUBDIR"
            # SoC prefixes derived from every dtb prefix in the family
            # e.g. "mt8173-elm mt8183-kukui" -> mt8173 mt8183
            SOC_PREFIXES=""
            for dp in ${{ matrix.dtb_prefixes }}; do
              soc="${dp%%-*}"
              case " ${SOC_PREFIXES} " in
                *" ${soc} "*) ;;
                *) SOC_PREFIXES="${SOC_PREFIXES:+${SOC_PREFIXES} }${soc}" ;;
              esac
            done
            echo "==> SoC patch prefixes: ${SOC_PREFIXES}"
            if [[ -d "$EXT_PATCH_DIR" ]]; then
              shopt -s nullglob
              # SoC-specific patches (e.g. mt8183*.patch, mt8173*.patch, rk3399*.patch)
              for SOC_PREFIX in ${SOC_PREFIXES}; do
                soc_patches=("${EXT_PATCH_DIR}"/${SOC_PREFIX}*.patch)
                [[ ${#soc_patches[@]} -gt 0 ]] && \
                  echo "==> ${#soc_patches[@]} external ${SOC_PREFIX} patch(es)..." && \
                  for p in "${soc_patches[@]}"; do apply_patch "$p"; done
              done
              # Family-wide patches (e.g. mt81xx*.patch) - only if not already covered
              FAMILY_PREFIX="${{ matrix.family }}"
              case " ${SOC_PREFIXES} " in
                *" ${FAMILY_PREFIX} "*) ;;
                *)
                  family_patches=("${EXT_PATCH_DIR}"/${FAMILY_PREFIX}*.patch)
                  [[ ${#family_patches[@]} -gt 0 ]] && \
                    echo "==> ${#family_patches[@]} external ${FAMILY_PREFIX} patch(es)..." && \
                    for p in "${family_patches[@]}"; do apply_patch "$p"; done
                  ;;
              esac
            else
              echo "WARNING: external patch dir not found: $EXT_PATCH_DIR"
            fi
          else
            echo "No external patch source configured for ${{ matrix.platform }}"
          fi

          # 2. Local contributor patches
          if [[ "$PATCH_DIR" != "none" && -n "$PATCH_DIR" ]]; then
            LOCAL_DIR="${GITHUB_WORKSPACE}/patches/${PATCH_DIR}"
            if [[ -d "$LOCAL_DIR" ]]; then
              shopt -s nullglob
              local_patches=("${LOCAL_DIR}"/*.patch)
              if [[ ${#local_patches[@]} -gt 0 ]]; then
                echo "==> ${#local_patches[@]} local patch(es) from patches/${PATCH_DIR}..."
                for p in "${local_patches[@]}"; do apply_patch "$p"; done
              else
                echo "No *.patch files in patches/${PATCH_DIR}"
              fi
            else
              echo "WARNING: patches/${PATCH_DIR} not found"
            fi
          fi

      - name: Merge kernel config
        env:
          KERNEL_FULL:    ${{ needs.resolve-version.outputs.kernel_full }}
          ARM64_EXT_DIR:  ${{ env.ARM64_EXT_DIR }}
          ARM64_KCO_DIR:  ${{ env.ARM64_KCO_DIR }}
        run: |
          chmod +x scripts/merge_kernel_config_arm64.sh
          scripts/merge_kernel_config_arm64.sh \
            --kernel-src "/var/tmp/kernel-build/linux-${KERNEL_FULL}" \
            --platform   "${{ matrix.platform }}" \
            --codename   "${{ matrix.family }}"

      - name: Build kernel
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -s
          LOCAL_VERSION="-${{ matrix.family }}"
          cd "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          time make ARCH=arm64 \
            CC="ccache gcc" \
            LOCALVERSION="${LOCAL_VERSION}" \
            INSTALL_MOD_STRIP=1 \
            -j$(nproc) \
            Image dtbs modules
          ccache -s
          echo "LOCAL_VERSION=${LOCAL_VERSION}" >> "$GITHUB_ENV"

      # --------------------------------------------------------
      # Package
      # Cmdline lookup order (first match wins):
      #   configs/cmdline/<platform>.cmdline
      #   configs/cmdline/chromebook-kukui.cmdline   (fallback)
      # One cmdline per family: all velvet-os devices share the
      # same partition layout. A device needing different kernel
      # parameters needs its own platform value in hardware_map.conf.
      # --------------------------------------------------------
      - name: Package tar.gz
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          KSRC="/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          FAMILY="${{ matrix.family }}"
          CODENAMES="${{ matrix.codenames }}"
          PLATFORM="${{ matrix.platform }}"
          kver=$(make -C "$KSRC" ARCH=arm64 LOCALVERSION="${LOCAL_VERSION}" \
                 --no-print-directory kernelrelease)
          echo "Packaging: $kver"

          STAGE=$(mktemp -d)
          BOOT="${STAGE}/boot"
          mkdir -p "${BOOT}"

          make -C "$KSRC" ARCH=arm64 \
            INSTALL_MOD_PATH="${STAGE}" INSTALL_MOD_STRIP=1 modules_install

          cp "${KSRC}/.config"               "${BOOT}/config-${kver}"
          cp "${KSRC}/arch/arm64/boot/Image" "${BOOT}/Image-${kver}"
          cp "${KSRC}/System.map"            "${BOOT}/System.map-${kver}"

          mkdir -p "${BOOT}/dtb-${kver}"
          # Derive DTS vendor subdir from platform: mediatek-mt81xx -> mediatek, rockchip-rk33xx -> rockchip
          DTS_VENDOR=$(echo "${{ matrix.platform }}" | cut -d- -f1)
          DTS_DIR="${KSRC}/arch/arm64/boot/dts/${DTS_VENDOR}"
          for DTB_PREFIX in ${{ matrix.dtb_prefixes }}; do
            echo "Copying DTBs matching: ${DTS_DIR}/${DTB_PREFIX}-*.dtb"
            find "${DTS_DIR}" -name "${DTB_PREFIX}-*.dtb" \
              -exec cp -v {} "${BOOT}/dtb-${kver}/" \;
          done
          DTB_COUNT=$(find "${BOOT}/dtb-${kver}" -name '*.dtb' | wc -l)
          echo "Staged ${DTB_COUNT} DTB(s) for family ${FAMILY} (${CODENAMES})"
          [[ "$DTB_COUNT" -eq 0 ]] && { echo "ERROR: no DTBs matching ${{ matrix.dtb_prefixes }}"; exit 1; }

          lz4 -f "${BOOT}/Image-${kver}" "${STAGE}/Image.lz4"
          dd if=/dev/zero of="${STAGE}/bootloader.bin" bs=512 count=1 2>/dev/null

          DTB_ARGS=()
          while IFS= read -r -d '' dtb; do
            DTB_ARGS+=(-b "$dtb")
          done < <(find "${BOOT}/dtb-${kver}" -name '*.dtb' -print0 | sort -z)

          mkimage \
            -D "-I dts -O dtb -p 2048" \
            -f auto -A arm64 -O linux -T kernel -C lz4 -a 0 \
            -d "${STAGE}/Image.lz4" "${DTB_ARGS[@]}" \
            "${STAGE}/kernel.itb"

          # Cmdline lookup
          CMDLINE_FILE=""
          for candidate in \
              "configs/cmdline/${PLATFORM}.cmdline" \
              "configs/cmdline/chromebook-kukui.cmdline"; do
            if [[ -f "$candidate" ]]; then
              CMDLINE_FILE="$candidate"
              echo "Using cmdline: $CMDLINE_FILE"
              break
            fi
          done
          [[ -z "$CMDLINE_FILE" ]] && \
            { echo "ERROR: no cmdline found for ${PLATFORM}"; exit 1; }

          vbutil_kernel \
            --pack "${BOOT}/vmlinux.kpart-${kver}" \
            --keyblock    /usr/share/vboot/devkeys/kernel.keyblock \
            --signprivate /usr/share/vboot/devkeys/kernel_data_key.vbprivk \
            --version 1 \
            --config      "${CMDLINE_FILE}" \
            --bootloader  "${STAGE}/bootloader.bin" \
            --vmlinuz     "${STAGE}/kernel.itb" \
            --arch arm

          vbutil_kernel \
            --verify "${BOOT}/vmlinux.kpart-${kver}" \
            --signpubkey /usr/share/vboot/devkeys/kernel_subkey.vbpubk

          mkdir -p output
          BUILD_DATE=$(date +%Y%m%d)
          RUN_NUM="${{ github.run_number }}"
          # kver already encodes the family via LOCALVERSION - no duplication
          TARBALL="output/linux-${kver}-${BUILD_DATE}-r${RUN_NUM}.tar.gz"
          tar czf "${TARBALL}" \
            -C "${STAGE}" \
            "boot/Image-${kver}" \
            "boot/System.map-${kver}" \
            "boot/config-${kver}" \
            "boot/dtb-${kver}" \
            "boot/vmlinux.kpart-${kver}" \
            "lib/modules/${kver}"
          cp "${KSRC}/.config" "output/config-${kver}-${BUILD_DATE}-r${RUN_NUM}"
          rm -rf "${STAGE}"
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.family }}-${{ needs.resolve-version.outputs.kernel_full }}
          path: output/
          retention-days: 30

  # ============================================================
  # Release - schedule or workflow_dispatch only
  # ============================================================
  release:
    name: Create release
    needs: [ resolve-version, generate-matrix, build ]
    runs-on: ubuntu-26.04
    if: |
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.resolve-version.result == 'success' &&
      needs.generate-matrix.outputs.skip != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: kernel-*
          merge-multiple: true

      - name: Check for partial failures
        id: build_status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "partial_failure=true" >> "$GITHUB_OUTPUT"
            echo "WARNING: one or more device builds failed - releasing successful builds only"
            echo "PARTIAL_WARNING=⚠️ **Partial build** — one or more devices failed. Check the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Only successful device builds are attached below." >> "$GITHUB_ENV"
          else
            echo "partial_failure=false" >> "$GITHUB_OUTPUT"
            echo "PARTIAL_WARNING=" >> "$GITHUB_ENV"
          fi

          if [[ -z "$(ls -A release-files 2>/dev/null)" ]]; then
            echo "ERROR: no artifacts to release - all builds failed"
            exit 1
          fi

          ls -lh release-files/

      - name: Get build date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Set release metadata
        id: release_meta
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "tag_prefix=" >> "$GITHUB_OUTPUT"
            echo "name_prefix=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_prefix=${BRANCH}-" >> "$GITHUB_OUTPUT"
            echo "name_prefix=[${BRANCH}] " >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_prefix }}${{ needs.resolve-version.outputs.kernel_full }}-chromebook-arm64-${{ steps.date.outputs.date }}
          name: "${{ steps.release_meta.outputs.name_prefix }}ARM64 Chromebook Kernels - linux-${{ needs.resolve-version.outputs.kernel_full }} (${{ steps.date.outputs.date }})"
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          body: |
            ## ARM64 Chromebook Kernels

            Kernel version: **linux-${{ needs.resolve-version.outputs.kernel_full }}**
            Built: ${{ github.run_id }}

            ${{ env.PARTIAL_WARNING }}

            Devices are driven by `configs/hardware_map.conf` (arch=arm64 entries).

            ### Installation (velvet-os + velvet-tools)

            Tarball naming: `linux-<kver>-<date>-r<N>.tar.gz` where `<kver>` is `<x.y.z>-<family>` - one tarball per device family; the FIT image carries all family DTBs and the bootloader selects the right one automatically
            Kernel version string: `<x.y.z>-<family>`

            ```bash
            sudo tar xzf linux-<kver>-<date>-r<N>.tar.gz -C /
            sudo vtlist
            # note the kernel version listed, then:
            sudo vtbuild <x.y.z>-<family>
            sudo reboot
            ```

            Example for the mt81xx family (esche, oak):
            ```bash
            sudo tar xzf linux-7.0.3-mt81xx-20260506-r47.tar.gz -C /
            sudo vtbuild 7.0.3-mt81xx
            sudo reboot
            ```

            If `init_gen_hook=y` is set in `/etc/velvettools/config` (default),
            vtbuild runs automatically after extraction — skip that step if so.

            ### Installation (manual kpart flash)

            For non-os systems or manual installs:

            ```bash
            sudo tar xzf linux-<kver>-<date>-r<N>.tar.gz -C /
            KERN=$(cgpt find -t kernel /dev/mmcblk1 | head -1)
            sudo dd if=/boot/vmlinux.kpart-<kver> of="${KERN}" bs=4M
            sudo cgpt add -i "${KERN##*p}" -P 15 -T 1 -S 1 /dev/mmcblk1
            sudo reboot
            ```
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-releases:
    name: Prune releases older than newest 6
    needs: release
    runs-on: ubuntu-26.04
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - name: Delete old arm64 releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # arm64 tags end in -chromebook-arm64-<8-digit-date>; the x86_64
          # workflow's tags (-chromebook-<date>) are NOT matched here.
          # "|| true" keeps the step green when grep matches nothing
          # (e.g. no releases yet, or a future tag-scheme change).
          TAGS=$(gh release list -R "$REPO" --limit 200 --json tagName -q '.[].tagName' \
                   | grep -E -- '-chromebook-arm64-[0-9]{8}$' || true)
          echo "$TAGS" | tail -n +7 | while read -r tag; do
            [[ -z "$tag" ]] && continue
            echo "Deleting release: $tag"
            if gh release delete "$tag" -R "$REPO" -y; then
              # Tag ref may already be gone (manual git tag deletion, or
              # draft releases which never create a ref) - don't fail on 422.
              gh api -X DELETE "repos/$REPO/git/refs/tags/$tag" \
                >/dev/null 2>&1 && echo "  tag deleted" \
                || echo "  tag ref already absent"
            else
              echo "  WARN: could not delete release $tag - continuing"
            fi
          done
          echo "Done - newest 6 arm64 releases retained"
