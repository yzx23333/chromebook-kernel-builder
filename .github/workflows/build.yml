name: Build Chromebook Kernels

on:
  # Run weekly on Sunday at 02:00 UTC to pick up new kernel point releases
  schedule:
    - cron: '0 2 * * 0'

  # Run on push to main when commit message contains [build:platform] or [build:all]
  push:
    branches: [ main, next ]

  # Allow manual trigger with optional kernel version override
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel series override (e.g. 6.6 or 6.12), leave blank for default'
        required: false
        default: ''
      platform_filter:
        description: 'Build only this platform (e.g. stoney-ridge), leave blank for all'
        required: false
        default: ''
      codename_filter:
        description: 'Build only this codename (e.g. treeya), leave blank for all x86_64'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ============================================================
  # Resolve the kernel version once, share across all matrix jobs
  # ============================================================
  resolve-version:
    name: Resolve kernel version
    runs-on: ubuntu-24.04
    outputs:
      kernel_series: ${{ steps.resolve.outputs.kernel_series }}
      kernel_full: ${{ steps.resolve.outputs.kernel_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve kernel version
        id: resolve
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          # Priority order:
          #   1. [kernel:x.y.z] or [kernel:x.y] tag in commit message
          #   2. workflow_dispatch kernel_version input
          #   3. DEFAULT_SERIES from kernel_versions.conf
          KERNEL_TAG=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            KERNEL_TAG=$(echo "$COMMITS_JSON" | \
              grep -oP '(?<=\[kernel:)[0-9]+\.[0-9]+(\.[0-9]+)?(?=\])' | head -1 || true)
            [[ -n "$KERNEL_TAG" ]] && echo "Kernel override from commit tag: $KERNEL_TAG" || true
          fi

          if [[ -n "$KERNEL_TAG" ]]; then
            SERIES="$KERNEL_TAG"
          elif [[ -n "${{ github.event.inputs.kernel_version }}" ]]; then
            SERIES="${{ github.event.inputs.kernel_version }}"
          else
            SERIES=$(grep "^DEFAULT_SERIES=" configs/kernel_versions.conf | cut -d= -f2)
          fi

          echo "Kernel series: $SERIES"
          echo "kernel_series=$SERIES" >> "$GITHUB_OUTPUT"

          # Resolve latest point release in this series
          FULL=$(curl -s --max-time 15 "https://www.kernel.org/releases.json" | \
            grep -o '"version": *"[0-9]*\.[0-9]*\.[0-9]*"' | \
            grep -o '"[0-9]*\.[0-9]*\.[0-9]*"' | \
            tr -d '"' | \
            grep "^${SERIES}\." | \
            sort -t. -k1,1n -k2,2n -k3,3n | \
            tail -1)

          # If SERIES was a full version (e.g. 6.19.6), use it directly
          if [[ -z "$FULL" && "$SERIES" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            FULL="$SERIES"
            echo "Using exact version from tag: $FULL"
          fi

          if [[ -z "$FULL" ]]; then
            echo "ERROR: Could not resolve latest ${SERIES}.x from kernel.org"
            exit 1
          fi
          echo "Resolved: linux-$FULL"
          echo "kernel_full=$FULL" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Generate build matrix from hardware_map.conf (arch=x86_64)
  #
  # hardware_map.conf format:
  #   CODENAME|PLATFORM|KERNEL_SERIES|PATCH_DIR|ARCH|NOTES
  #
  # Field 5 (ARCH) must be "x86_64" to be included here.
  # One build job is created per unique platform (not per device).
  # Comment out lines in hardware_map.conf to exclude platforms.
  # ============================================================
  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-24.04
    needs: resolve-version
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      skip:   ${{ steps.gen.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check push trigger
        id: push_check
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_TAG=$(echo "$COMMITS_JSON" | \
              grep -oP '(?<=\[build:)[^\]]+' | head -1 || true)
            echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "build_tag=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate matrix from hardware_map.conf
        id: gen
        env:
          BUILD_TAG:       ${{ steps.push_check.outputs.build_tag }}
          PLATFORM_FILTER: ${{ github.event.inputs.platform_filter }}
          CODENAME_FILTER: ${{ github.event.inputs.codename_filter }}
          KERNEL_SERIES:   ${{ needs.resolve-version.outputs.kernel_series }}
        run: |
          # On push, require [build:*] tag
          if [[ "${{ github.event_name }}" == "push" && -z "$BUILD_TAG" ]]; then
            echo "No [build:*] tag in commit message - skipping x86_64 build"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse hardware_map.conf for x86_64 entries
          # Build one matrix entry per unique platform (not per device)
          declare -A SEEN_PLATFORMS
          ENTRIES=()
          while IFS='|' read -r codename platform series patch_dir arch notes; do
            [[ -z "$codename" || "$codename" == \#* ]] && continue
            codename="${codename// /}"; codename="${codename%%#*}"
            platform="${platform// /}"
            series="${series// /}"
            patch_dir="${patch_dir// /}"
            arch="${arch// /}"
            [[ "$arch" != "x86_64" ]] && continue
            # Deduplicate by platform
            [[ -n "${SEEN_PLATFORMS[$platform]+x}" ]] && continue
            SEEN_PLATFORMS[$platform]=1
            [[ "$series" == "default" ]] && series="$KERNEL_SERIES"
            ENTRIES+=("${platform}|${series}|${patch_dir}")
          done < configs/hardware_map.conf

          if [[ ${#ENTRIES[@]} -eq 0 ]]; then
            echo "No x86_64 entries found in hardware_map.conf - skipping"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build JSON matrix with optional filters
          JSON='{"include":['
          FIRST=true
          for entry in "${ENTRIES[@]}"; do
            IFS='|' read -r platform series patch_dir <<< "$entry"

            # push filter
            if [[ "${{ github.event_name }}" == "push" ]]; then
              if [[ "$BUILD_TAG" != "all" && "$BUILD_TAG" != "x86_64" \
                    && "$BUILD_TAG" != "$platform" ]]; then
                continue
              fi
            fi

            # workflow_dispatch filters
            if [[ -n "$PLATFORM_FILTER" && "$PLATFORM_FILTER" != "all" \
                  && "$PLATFORM_FILTER" != "$platform" ]]; then
              continue
            fi

            [[ "$FIRST" == "true" ]] && FIRST=false || JSON+=','
            JSON+="{\"platform\":\"${platform}\","
            JSON+="\"kernel_series\":\"${series}\","
            JSON+="\"patch_dir\":\"${patch_dir}\"}"
          done
          JSON+=']}'

          # If all entries were filtered out, use dummy to avoid empty matrix error
          if [[ "$FIRST" == "true" ]]; then
            echo "No platforms matched filters - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[{\"platform\":\"skip\",\"kernel_series\":\"skip\",\"patch_dir\":\"skip\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Matrix: $JSON"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "skip=false"   >> "$GITHUB_OUTPUT"

  # ============================================================
  # Build - one job per platform
  # ============================================================
  build:
    name: Build ${{ matrix.platform }}
    needs: [ resolve-version, generate-matrix ]
    if: needs.generate-matrix.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Cache the kernel source tarball - keyed by full version
      # Saves ~140MB download on repeat runs for same version
      # --------------------------------------------------------
      - name: Cache kernel tarball
        uses: actions/cache@v4
        with:
          path: /var/tmp/kernel-tarballs
          key: kernel-tarball-${{ needs.resolve-version.outputs.kernel_full }}

      # --------------------------------------------------------
      # Cache ccache - keyed by platform + series
      # Falls back to any previous cache for this platform
      # --------------------------------------------------------
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_full }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_series }}.
            ccache-${{ matrix.platform }}-

      # --------------------------------------------------------
      # Install build dependencies
      # --------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            libdw-dev \
            dwarves pahole debhelper rsync \
            kmod wget curl git xz-utils ccache \
            zstd

      # --------------------------------------------------------
      # Platform-specific firmware prerequisites
      # --------------------------------------------------------
      - name: Install platform firmware
        run: |
          case "${{ matrix.platform }}" in
            stoney-ridge|amd-grunt|amd-ryzen-zork|amd-mendocino)
              # Ubuntu: linux-firmware contains amdgpu blobs
              sudo apt-get install -y linux-firmware
              # Decompress stoney firmware blobs if present as .zst
              for f in /lib/firmware/amdgpu/stoney_*.bin.zst; do
                [[ -f "${f%.zst}" ]] && continue
                sudo zstd -d "$f" -o "${f%.zst}" 2>/dev/null || true
              done
              # If still missing, download directly from linux-firmware git
              MISSING=()
              for blob in ce me mec pfp rlc sdma uvd vce; do
                [[ ! -f "/lib/firmware/amdgpu/stoney_${blob}.bin" ]] && \
                  MISSING+=("stoney_${blob}.bin")
              done
              if [[ ${#MISSING[@]} -gt 0 ]]; then
                echo "Downloading missing blobs: ${MISSING[*]}"
                for blob in "${MISSING[@]}"; do
                  sudo wget -q \
                    "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/amdgpu/${blob}" \
                    -O "/lib/firmware/amdgpu/${blob}"
                done
              fi
              echo "Stoney firmware present:"
              ls /lib/firmware/amdgpu/stoney_*.bin 2>/dev/null || echo "  (none - stoney-only check skipped for non-stoney AMD)"
              ;;
            geminilake|intel-*)
              # Ubuntu: linux-firmware covers iwlwifi and SOF DSP firmware
              sudo apt-get install -y linux-firmware
              ;;
          esac

      # --------------------------------------------------------
      # Download kernel source (uses cache if available)
      # --------------------------------------------------------
      - name: Download kernel source
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          mkdir -p /var/tmp/kernel-tarballs
          TARBALL="/var/tmp/kernel-tarballs/linux-${KERNEL_FULL}.tar.xz"
          if [[ ! -f "$TARBALL" ]]; then
            MAJOR="${KERNEL_FULL%%.*}"
            echo "Downloading linux-${KERNEL_FULL}.tar.xz..."
            wget -q -O "$TARBALL" \
              "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KERNEL_FULL}.tar.xz"
          else
            echo "Using cached tarball: $TARBALL"
          fi

          echo "Extracting..."
          mkdir -p /var/tmp/kernel-build
          tar -xf "$TARBALL" -C /var/tmp/kernel-build
          echo "Source ready: /var/tmp/kernel-build/linux-${KERNEL_FULL}"

      # --------------------------------------------------------
      # Apply patches
      # --------------------------------------------------------
      - name: Apply patches
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          sudo chown -R "$USER:$USER" "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          PATCH_DIR="patches/${{ matrix.platform }}"
          SRCDIR="/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          cd "$SRCDIR"
          if [[ -d "${GITHUB_WORKSPACE}/${PATCH_DIR}" ]]; then
            shopt -s nullglob
            patches=("${GITHUB_WORKSPACE}/${PATCH_DIR}"/*.patch)
            if [[ ${#patches[@]} -gt 0 ]]; then
              echo "Applying ${#patches[@]} patch(es)..."
              for p in "${patches[@]}"; do
                echo "  $(basename "$p")"
                patch -p1 --forward < "$p" || \
                  echo "WARNING: patch $(basename "$p") did not apply cleanly"
              done
            else
              echo "No .patch files in $PATCH_DIR"
            fi
          else
            echo "No patch directory for ${{ matrix.platform }}"
          fi

      # --------------------------------------------------------
      # Merge kernel config
      # --------------------------------------------------------
      - name: Merge kernel config
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          sudo chown -R "$USER:$USER" "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          chmod +x scripts/merge_kernel_config.sh
          BASE_CFG="${GITHUB_WORKSPACE}/configs/base/chromebooks-x86_64.cfg"
          scripts/merge_kernel_config.sh \
            --kernel-src "/var/tmp/kernel-build/linux-${KERNEL_FULL}" \
            --platform "${{ matrix.platform }}" \
            --base-config "$BASE_CFG"

      # --------------------------------------------------------
      # Build kernel .deb packages with ccache
      # --------------------------------------------------------
      - name: Build kernel
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -s

          LOCAL_VERSION="-chromebook-${PLATFORM}"
          FULL_PKG_VERSION="${KERNEL_FULL}${LOCAL_VERSION}"

          cd "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          time make ARCH=x86_64 \
            CC="ccache gcc" \
            LOCALVERSION="${LOCAL_VERSION}" \
            KDEB_PKGVERSION="${FULL_PKG_VERSION}-1" \
            KDEB_COMPRESS="xz" \
            INSTALL_MOD_STRIP=1 \
            bindeb-pkg \
            -j$(nproc)

          ccache -s
          echo "FULL_PKG_VERSION=${FULL_PKG_VERSION}" >> "$GITHUB_ENV"

      # --------------------------------------------------------
      # Generate APT pin file
      # --------------------------------------------------------
      - name: Generate APT pin file
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p output
          chmod +x scripts/install_apt_pin.sh
          scripts/install_apt_pin.sh \
            --generate \
            "${KERNEL_FULL}-chromebook-${PLATFORM}" \
            "${PLATFORM}" \
            "${PLATFORM}" \
            "output/99-chromebook-kernel-${PLATFORM}"

      # --------------------------------------------------------
      # Collect output files
      # --------------------------------------------------------
      - name: Collect output
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          PLATFORM: ${{ matrix.platform }}
          RUN_NUM: ${{ github.run_number }}
        run: |
          mkdir -p output
          find /var/tmp/kernel-build -maxdepth 1 -name "*.deb" \
            -exec cp {} output/ \;
          cp "/var/tmp/kernel-build/linux-${KERNEL_FULL}/.config" \
            "output/config-${KERNEL_FULL}-${PLATFORM}-r${RUN_NUM}"
          echo "Output files:"
          ls -lh output/

      # --------------------------------------------------------
      # Upload as workflow artifact
      # --------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_full }}-r${{ github.run_number }}
          path: output/
          retention-days: 30

  # ============================================================
  # Create a GitHub Release with all platform artifacts combined
  # Only runs on scheduled and workflow_dispatch triggers
  # ============================================================
  release:
    name: Create release
    needs: [ resolve-version, generate-matrix, build ]
    runs-on: ubuntu-24.04
    if: |
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.resolve-version.result == 'success' &&
      needs.generate-matrix.outputs.skip != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: kernel-*
          merge-multiple: true

      - name: Check for partial failures
        id: build_status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "partial_failure=true" >> "$GITHUB_OUTPUT"
            echo "WARNING: one or more platform builds failed - releasing successful builds only"
            echo "PARTIAL_WARNING=⚠️ **Partial build** — one or more platforms failed. Check the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> "$GITHUB_ENV"
          else
            echo "partial_failure=false" >> "$GITHUB_OUTPUT"
            echo "PARTIAL_WARNING=" >> "$GITHUB_ENV"
          fi
          if [[ -z "$(ls -A release-files 2>/dev/null)" ]]; then
            echo "ERROR: no artifacts to release - all builds failed"
            exit 1
          fi
          ls -lh release-files/

      - name: Get build date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Set release metadata
        id: release_meta
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "tag_prefix=" >> "$GITHUB_OUTPUT"
            echo "name_prefix=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_prefix=${BRANCH}-" >> "$GITHUB_OUTPUT"
            echo "name_prefix=[${BRANCH}] " >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_prefix }}${{ needs.resolve-version.outputs.kernel_full }}-chromebook-${{ steps.date.outputs.date }}
          name: "${{ steps.release_meta.outputs.name_prefix }}Chromebook Kernels - linux-${{ needs.resolve-version.outputs.kernel_full }} (${{ steps.date.outputs.date }})"
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          body: |
            ## Chromebook OS Custom Chromebook Kernels

            Kernel version: **linux-${{ needs.resolve-version.outputs.kernel_full }}**
            Built: ${{ github.run_id }}

            ${{ env.PARTIAL_WARNING }}

            Platforms are driven by `configs/hardware_map.conf` (arch=x86_64 entries).

            ### Installation
            ```bash
            # Find your board codename
            cat /sys/class/dmi/id/board_name

            # Look up your platform in hardware_map.conf:
            # https://github.com/unixabg/chromebook-kernel-builder/blob/main/configs/hardware_map.conf

            # Install kernel (replace PLATFORM with your platform name)
            PLATFORM=stoney-ridge
            sudo dpkg -i linux-image-*-chromebook-${PLATFORM}*.deb \
                         linux-headers-*-chromebook-${PLATFORM}*.deb

            # Pin to prevent apt upgrades overwriting this kernel
            sudo cp 99-chromebook-kernel-${PLATFORM} /etc/apt/preferences.d/
            sudo apt-mark hold linux-image-*-chromebook-${PLATFORM}

            # Reboot, then set up audio if needed
            git clone https://github.com/WeirdTreeThing/chromebook-linux-audio
            cd chromebook-linux-audio && sudo ./setup-audio
            ```

            ### Audio notes
            - **stoney-ridge**: Requires `chromebook-linux-audio` for UCM/topology files.
            - All other platforms: audio should work out of the box after `setup-audio`.
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
